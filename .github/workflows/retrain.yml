name: 每周自动重训模型

on:
  schedule:
    - cron: '0 19 * * 0'
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4   # v3 → v4

      - name: 设置 Python
        uses: actions/setup-python@v5   # v4 → v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install pandas numpy xgboost scikit-learn supabase openpyxl

      - name: 重训模型
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        # 允许脚本在数据不足时正常退出，不中断工作流
        continue-on-error: true
        run: |
          python retrain_from_db.py

      - name: 提交新模型（仅当文件有变动时）
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add model_cache/
          git diff --staged --quiet || git commit -m "🤖 自动重训"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/FAN-6244/FXD.git

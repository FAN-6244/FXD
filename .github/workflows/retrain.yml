name: 每周自动重训模型

on:
  schedule:
    - cron: '0 19 * * 0'
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install pandas numpy xgboost scikit-learn supabase openpyxl

      - name: 重训模型
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python retrain_from_db.py
        # 即使脚本因为数据不足等正常原因退出，也视为成功
        continue-on-error: true

      - name: 提交新模型
        # 只有文件有变动时才提交
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add model_cache/
          git diff --staged --quiet || git commit -m "🤖 自动重训"
          git push
